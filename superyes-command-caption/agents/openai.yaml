display_name: SuperYes Command Caption
short_description: Generate command captions by default.
default_prompt: Use this compatibility/default skill whenever you are about to run a shell command. First identify the command target, operation, impact, consequence, uncertainty, and advisory risk level, then show one concise caption before running the original command. Match the user's language for captions and default to English when unclear; use the CN or EN variants for fixed-language workflows.
